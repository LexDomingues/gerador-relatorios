<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caixa de Vendas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: Poppins, sans-serif;
    background: #f2f4f8;
    margin: 0;
}

header {
    background: #2d3436;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
}

.container {
    width: 70%;
    margin: 30px auto;
}

.produto {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
}

input {
    width: 80px;
    padding: 8px;
}

.total {
    background: white;
    padding: 20px;
    border-radius: 10px;
    font-size: 22px;
    font-weight: 600;
    margin-top: 20px;
}

button {
    background: #00b894;
    border: none;
    padding: 15px 25px;
    color: white;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>Sistema de Caixa</header>

<div class="container">

<form action="/venda" method="post">

{% for produto in produtos %}
<div class="produto">

    <div>
        <strong>{{ produto.nome }}</strong><br>
        R$ <span class="preco">{{ produto.preco }}</span>
    </div>

    <input type="number"
           name="qtd_{{ produto.codigo }}"
           value="0"
           min="0"
           onchange="calcularTotal()">

</div>
{% endfor %}

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<button type="submit">Finalizar Venda</button>

</form>

</div>

<script>
function calcularTotal() {

    let precos = document.getElementsByClassName("preco");
    let inputs = document.querySelectorAll("input[type='number']");
    let total = 0;

    for (let i = 0; i < inputs.length; i++) {
        let quantidade = parseFloat(inputs[i].value);
        let preco = parseFloat(precos[i].innerText);

        total += quantidade * preco;
    }

    document.getElementById("total").innerText = total.toFixed(2);
}
</script>

</body>
</html>
